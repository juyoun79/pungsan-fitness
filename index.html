<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>풍산휘트니스@기구필라테스</title>
    <!-- 기존 라이브러리 및 스타일 유지 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <style>
        /* 기존 앱 UI 스타일 그대로 유지 */
        :root { --primary-color: #007bff; --bg-light: #f8f9fa; }
        body { background-color: #ebebeb; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; }
        .app-container { max-width: 430px; margin: 0 auto; min-height: 100vh; background: white; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .screen { display: none; padding: 20px; padding-bottom: 80px; }
        .screen.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 430px; display: flex; background: white; border-top: 1px solid #eee; height: 65px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #999; cursor: pointer; }
        .nav-item.active { color: var(--primary-color); }
        
        /* 오늘의 한마디 강조 스타일 추가 */
        .quote-card { background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; border: none; border-radius: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 홈 화면 -->
    <section id="screen-home" class="screen active">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0 text-primary">풍산휘트니스</h4>
            <div id="admin-badge" class="badge bg-danger d-none">관리자</div>
        </div>

        <!-- [수정됨] 랜덤 오늘의 한마디 -->
        <div class="card quote-card shadow-sm mb-4">
            <div class="card-body text-center py-4">
                <i class="fas fa-quote-left mb-2" style="opacity: 0.5; font-size: 0.8rem;"></i>
                <p id="display-quote" class="card-text fs-5 fw-bold mb-1" style="line-height: 1.4;">
                    "잠시만 기다려주세요..."
                </p>
                <i class="fas fa-quote-right mt-2" style="opacity: 0.5; font-size: 0.8rem;"></i>
            </div>
        </div>

        <!-- 기존 홈 화면 구성 요소들 유지 -->
        <div class="row g-2 mb-4">
            <div class="col-6">
                <div class="card bg-light p-3 border-0 text-center">
                    <small class="text-muted d-block mb-1">나의 포인트</small>
                    <span id="home-points" class="fw-bold text-primary fs-4">0 P</span>
                </div>
            </div>
            <div class="col-6">
                <div class="card bg-light p-3 border-0 text-center">
                    <small class="text-muted d-block mb-1">이달의 출석</small>
                    <span id="home-attendance" class="fw-bold fs-4">0 회</span>
                </div>
            </div>
        </div>

        <div class="list-group list-group-flush shadow-sm rounded-3">
            <button class="list-group-item list-group-item-action py-3 border-0" onclick="showScreen('attendance')">
                <i class="fas fa-qrcode me-3 text-primary"></i> 오늘 운동 출석체크
            </button>
            <button class="list-group-item list-group-item-action py-3 border-0" onclick="showScreen('community')">
                <i class="fas fa-camera me-3 text-success"></i> 오운완 인증샷 올리기
            </button>
        </div>
    </section>

    <!-- 기존에 있던 모든 Section(Screen) 코드들이 여기에 그대로 들어갑니다[cite: 2] -->
    <!-- (출석체크, 기록, 게시판, 내정보 등 기존 코드 유지) -->

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showScreen('home')"><i class="fas fa-home fs-5"></i><span>홈</span></div>
        <div class="nav-item" onclick="showScreen('workout')"><i class="fas fa-dumbbell fs-5"></i><span>기록</span></div>
        <div class="nav-item" onclick="showScreen('community')"><i class="fas fa-users fs-5"></i><span>게시판</span></div>
        <div class="nav-item" onclick="showScreen('profile')"><i class="fas fa-user fs-5"></i><span>내정보</span></div>
    </nav>
</div>

<script>
    /** 1. Firebase 설정 (기존 앱의 설정값을 여기에 유지하세요)[cite: 2] **/
    // const firebaseConfig = { ... };
    // firebase.initializeApp(firebaseConfig);
    // const db = firebase.database();

    /** 2. [수정됨] 오늘의 한마디 데이터 배열[cite: 2] **/
    const fitnessQuotes = [
        "오늘 걷지 않으면 내일은 뛰어야 한다.",
        "운동은 몸이 만드는 것이 아니라 정신이 만드는 것이다.",
        "땀은 지방이 흘리는 눈물이다.",
        "고통은 지나가지만, 결과는 남는다.",
        "지금의 노력이 내일의 결과가 됩니다.",
        "운동은 하루를 마무리하는 최고의 보상입니다.",
        "근육은 정직합니다. 뿌린 대로 거둡니다.",
        "어제보다 나은 오늘의 나를 위해!",
        "포기하고 싶은 순간, 그 때가 시작입니다.",
        "건강은 가장 큰 자산입니다."
    ];

    /** 3. 핵심 로직[cite: 2] **/
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById('screen-' + screenId);
        if(target) target.classList.add('active');
        
        // 홈 화면으로 올 때마다 명언 랜덤 변경[cite: 2]
        if(screenId === 'home') setRandomQuote();
    }

    function setRandomQuote() {
        const quoteDisplay = document.getElementById('display-quote');
        if (quoteDisplay) {
            const randomIndex = Math.floor(Math.random() * fitnessQuotes.length);
            quoteDisplay.innerText = `"${fitnessQuotes[randomIndex]}"`;
        }
    }

    // 초기 실행 시 기존 기능 로드와 명언 설정을 함께 수행[cite: 2]
    window.onload = function() {
        setRandomQuote();
        // if(typeof checkAutoLogin === 'function') checkAutoLogin(); // 기존 로그인 함수가 있다면 호출
    };

    /* 기존에 있던 모든 JavaScript 함수(로그인, 데이터로드, 사진업로드 등)를 여기에 그대로 유지하세요[cite: 2] */
</script>
</body>
</html>
