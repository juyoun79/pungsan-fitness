<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pungsan Fitness Admin</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --danger-color: #FF3B30;
            --bg-color: #F2F2F7;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
        }

        /* 관리자 상단 헤더 */
        .admin-header {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .admin-menu-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .menu-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: white;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .menu-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 커뮤니티 삭제 버튼 스타일 */
        .community-del-btn {
            background-color: #FFF2F2 !important;
            color: var(--danger-color) !important;
            border-color: var(--danger-color) !important;
        }

        .community-del-btn.active {
            background-color: var(--danger-color) !important;
            color: white !important;
        }

        .admin-content {
            padding: 20px;
        }

        .section {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .section.active {
            display: block;
        }

        /* 하단 탭 제거 */
        .bottom-nav, #bottom-tab-bar, .nav-bar {
            display: none !important;
        }

        /* 게시글 삭제 리스트 */
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .del-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 7px 15px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="admin-header">
        <div class="admin-menu-bar">
            <button class="menu-btn active" onclick="showSec('dash', this)">대시보드</button>
            <button class="menu-btn" onclick="showSec('reg', this)">등록</button>
            <button class="menu-btn community-del-btn" onclick="showSec('comm', this)">커뮤니티 관리</button>
            <button class="menu-btn" onclick="showSec('mem', this)">회원관리</button>
            <button class="menu-btn" onclick="showSec('set', this)">설정</button>
        </div>
    </div>

    <div class="admin-content">
        <div id="dash" class="section active">
            <h2>대시보드</h2>
            <p>풍산 피트니스 관리 화면입니다.</p>
        </div>

        <div id="reg" class="section">
            <h2>등록 관리</h2>
            <p>새로운 프로그램을 등록하세요.</p>
        </div>

        <div id="comm" class="section">
            <h2>커뮤니티 삭제 관리</h2>
            <p style="color: #666; font-size: 14px;">부적절한 게시물을 삭제할 수 있습니다.</p>
            <div class="post-item">
                <div>
                    <strong>테스트 게시글입니다</strong><br>
                    <small>작성자: 홍길동 | 2026.05.01</small>
                </div>
                <button class="del-btn" onclick="confirm('정말 삭제하시겠습니까?')">삭제</button>
            </div>
        </div>

        <div id="mem" class="section">
            <h2>회원 관리</h2>
        </div>

        <div id="set" class="section">
            <h2>설정</h2>
        </div>
    </div>

    <script>
        function showSec(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
